# 公開情報源を確認し、新着候補を構造化データへ追加してPRを作成する
name: Weekly ingest

on:
  schedule:
    - cron: "0 0 * * 6" # 土曜09:00 JST
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "何日前まで遡って新着を確認するか"
        required: true
        default: "14"
      source_url:
        description: "追加で確認する公開情報源または記事URL"
        required: false
        default: ""

concurrency:
  group: weekly-ingest
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve collection window
        id: window
        env:
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '14' }}
        run: |
          case "$LOOKBACK_DAYS" in
            ''|*[!0-9]*)
              echo "lookback_days must be a positive integer" >&2
              exit 1
              ;;
          esac
          if [ "$LOOKBACK_DAYS" -lt 1 ] || [ "$LOOKBACK_DAYS" -gt 90 ]; then
            echo "lookback_days must be between 1 and 90" >&2
            exit 1
          fi
          echo "start=$(date -u -d "$LOOKBACK_DAYS days ago" +%F)" >> "$GITHUB_OUTPUT"
          echo "end=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Collect and classify public information with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4-mini
          effort: medium
          sandbox: workspace-write
          codex-args: '["--config", "web_search=\"live\""]'
          prompt: |
            ルートのCLAUDE.mdを最後まで読み、その取り込み規約に従ってください。

            data/sources.jsonのうちenabled=trueの情報源を確認し、${{ steps.window.outputs.start }}から${{ steps.window.outputs.end }}までに公開または更新された、CCA、UAV、航空戦闘AI、自動運転・自動制御・移動ロボット向け世界モデルおよびシミュレータに関する新着をdata/news.jsonへ追加してください。
            追加指定URL: ${{ inputs.source_url }}

            - 毎回対象期間全体を確認し、既存URLと同一イベントを除外することで、失敗した週の取り逃しを回収すること
            - タイトルだけで判定せず、各候補の原文を確認すること
            - collected_atに実行日を記録すること
            - 記事本文領域にある引用・参照リンクを抽出し、source/reference/related/selfに分類すること
            - ナビゲーション、広告、SNS共有、単なる製品リンクをcitationsへ含めないこと
            - 引用を確認していない記事を「引用なし」と扱わず、citation_scan_statusを正確に設定すること
            - URLと同一イベントの重複を避けること
            - 公表されていない性能や意図を推測しないこと
            - リアルタイムの部隊配置、飛行位置、作戦情報を掲載しないこと
            - 記事本文を保存しないこと
            - tools/build_site.pyとtools/verify_wiki.pyを実行すること
            - docs/wiki/log.mdの先頭へ`[ニュース]`として、号ではなく対象期間と追加件数を記録すること。追加0件の場合も記録すること
            - git commitとpushは行わないこと

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update autonomous airpower news"
          title: "Weekly ingest: CCA/UAV公開情報の更新"
          body: |
            公開情報源から生成した週次更新です。次を確認してからマージしてください。

            - 原文URL、発表日、収集日
            - 引用リンクとcitation_scan_status
            - 用途領域、企業、プログラム、機体、世界モデル、シミュレータ、技術の分類
            - 発表、契約、試験、量産、配備の区別
            - 注釈に推測や企業の宣伝表現が混入していないこと
            - 公開情報と安全性に関するCLAUDE.mdの規約
          branch: auto/weekly-ingest
          delete-branch: true
