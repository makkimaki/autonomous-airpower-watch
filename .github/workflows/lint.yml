# PR と main への push で wiki の整合性を検査する
name: Lint

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and verify static wiki
        run: |
          python3 tools/build_site.py
          python3 tools/verify_wiki.py
          git diff --exit-code -- docs/
